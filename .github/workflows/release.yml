name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publicar Release Oficial
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Gerar Binários e Checksums
        run: |
          mkdir -p dist
          VERSION=${{ github.ref_name }}
          
          GOOS=linux GOARCH=amd64 go build -o dist/assinatura-$VERSION-linux-amd64 ./cmd/assinatura
          GOOS=windows GOARCH=amd64 go build -o dist/assinatura-$VERSION-windows-amd64.exe ./cmd/assinatura
          GOOS=darwin GOARCH=amd64 go build -o dist/assinatura-$VERSION-macos-amd64 ./cmd/assinatura
          
          cd dist
          sha256sum * > checksums.txt
          cd ..

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}